<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>관리자 페이지</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="admin.css">
</head>
<body>
  <div class="container">
    <div class="admin-header">
      <div style="display:flex;align-items:center;gap:12px;">
        <h1>관리자 페이지</h1>
        <span id="sseStatus" class="sse-status">연결 중...</span>
      </div>
      <div style="display:flex;gap:12px;align-items:center;">
        <a href="/" class="back-btn">← 메인으로</a>
        <button id="logoutBtn" style="padding:6px 14px;background:#e53e3e;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:0.85rem;">로그아웃</button>
      </div>
    </div>

    <!-- 문의 목록 -->
    <section>
      <h2>문의 <span id="inquiryCount" class="badge badge-blue">0</span></h2>
      <div id="inquiryList">
        <p class="empty-msg">문의가 없습니다.</p>
      </div>
    </section>

    <hr>

    <!-- 대기 중인 제출 -->
    <section>
      <h2>대기 중인 제출 <span id="pendingCount" class="badge">0</span></h2>
      <div id="pendingList">
        <p class="empty-msg">대기 중인 힌트가 없습니다.</p>
      </div>
    </section>

    <hr>

    <!-- 게시된 힌트 직접 수정 -->
    <section>
      <h2>게시된 힌트 직접 수정</h2>
      <div class="edit-form">
        <label>
          번호
          <select id="editNumber"></select>
        </label>
        <label>
          종류
          <select id="editType">
            <option value="day">1일차 힌트</option>
            <option value="day2">2일차 힌트</option>
            <option value="invite">친구 초대 힌트</option>
            <option value="quote">견적 분석 힌트</option>
          </select>
        </label>
        <label class="edit-content-label">
          내용
          <input type="text" id="editContent" placeholder="수정할 내용 입력" maxlength="300">
        </label>
        <button id="editBtn">수정 저장</button>
        <p id="editMsg"></p>
      </div>

      <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>번호</th>
            <th>1일차 힌트</th>
            <th>2일차 힌트</th>
            <th>친구 초대 힌트</th>
            <th>견적 분석 힌트</th>
            <th class="col-date">마지막 수정</th>
          </tr>
        </thead>
        <tbody id="publishedTable">
          <tr><td colspan="6">불러오는 중...</td></tr>
        </tbody>
      </table>
      </div>
    </section>
  </div>

  <!-- 푸터 -->
  <footer class="site-footer">
    <span class="footer-brand">개발: ION</span>
    <div class="footer-links">
      <a href="mailto:ion011227@gmail.com" class="footer-link" title="이메일">

          <rect x="2" y="4" width="20" height="16" rx="2"/><polyline points="2,4 12,13 22,4"/>
        </svg>
        ion011227@gmail.com
      </a>

</body>
